<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --bg-color: #6179c3;
      --card-bg: rgba(255, 255, 255, 0.25);
      --input-bg: rgba(255, 255, 255, 0.3);
      --text-color: #ffffff;
    }

    body { background-color: var(--bg-color); font-family: 'Montserrat', sans-serif; margin: 0; padding: 20px 0; display: flex; justify-content: center; min-height: 100vh; color: var(--text-color); }
    .container { background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 35px; padding: 25px; width: 90%; max-width: 400px; text-align: center; }
    
    .logo-container { margin-bottom: 20px; }
    .main-logo { width: 150px; height: auto; }

    .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 15px; }
    .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent; color: white; font-weight: bold; cursor: pointer; }
    .tab-btn.active { background: white; color: #6179c3; }

    .form-group { text-align: left; margin-bottom: 15px; }
    label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 8px; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.4); background: var(--input-bg); color: white; box-sizing: border-box; outline: none; }

    /* Tombol Pilihan Foto */
    .photo-options { display: flex; gap: 10px; margin-top: 5px; }
    .btn-opt { flex: 1; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 10px; border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }

    /* --- FULL SCREEN CAMERA OVERLAY --- */
    #camera-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #000; z-index: 9999; display: none; flex-direction: column;
    }
    #video { width: 100%; height: 100%; object-fit: cover; }
    .cam-controls {
      position: absolute; bottom: 30px; width: 100%;
      display: flex; justify-content: space-around; align-items: center;
    }
    .btn-shutter { width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid rgba(255,255,255,0.3); }
    .btn-cancel { color: white; background: rgba(255,0,0,0.6); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

    #preview-container { margin-top: 15px; display: none; }
    #preview-img { width: 100%; border-radius: 20px; border: 2px solid white; }

    .btn-action { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #ffffff; color: #6179c3; font-weight: bold; cursor: pointer; margin-top: 15px; }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; display: none; border: 2px solid white; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-container">
    <img src="https://raw.githubusercontent.com/razzaqvip/checktrx/refs/heads/main/logo.png" class="main-logo">
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('input-sec', this)">INPUT</button>
    <button class="tab-btn" onclick="switchTab('check-sec', this)">CHECK</button>
  </div>

  <div id="input-sec" class="form-content" style="display: block;">
    <div class="form-group">
      <label>No. Transaksi</label>
      <input type="text" id="noInput" placeholder="Ketik atau Scan...">
      <button class="btn-opt" style="margin-top:8px;" onclick="startScanner()">📸 Scan Barcode</button>
      <div id="reader"></div>
    </div>

    <div class="form-group">
      <label>Ambil Foto Pakaian</label>
      <div class="photo-options">
        <button class="btn-opt" onclick="document.getElementById('galleryInput').click()">📁 Galeri</button>
        <button class="btn-opt" onclick="openCamera()">📷 Kamera</button>
      </div>
      <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleGallery(this)">
      
      <div id="preview-container">
        <img id="preview-img">
        <p style="font-size:10px; color: #eee;">✅ Foto siap dikirim</p>
      </div>
    </div>

    <button class="btn-action" id="subBtn" onclick="submitData()">SIMPAN DATA</button>
  </div>

  <div id="check-sec" class="form-content" style="display:none;">
     </div>
</div>

<div id="camera-overlay">
  <video id="video" autoplay playsinline></video>
  <div class="cam-controls">
    <button class="btn-cancel" onclick="closeCamera()">BATAL</button>
    <button class="btn-shutter" onclick="takePhoto()"></button>
    <div style="width: 70px;"></div> </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
  let capturedBase64 = "";
  const video = document.getElementById('video');
  const overlay = document.getElementById('camera-overlay');

  // Buka Kamera Full Screen
  async function openCamera() {
    overlay.style.display = 'flex';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      video.srcObject = stream;
    } catch (err) {
      alert("Izin kamera ditolak atau tidak tersedia.");
      closeCamera();
    }
  }

  function closeCamera() {
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(track => track.stop());
    }
    overlay.style.display = 'none';
  }

  function takePhoto() {
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedBase64 = canvas.toDataURL('image/jpeg', 0.8);
    showPreview(capturedBase64);
    closeCamera();
  }

  // Handle Foto dari Galeri
  function handleGallery(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        capturedBase64 = e.target.result;
        showPreview(capturedBase64);
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function showPreview(src) {
    document.getElementById('preview-container').style.display = 'block';
    document.getElementById('preview-img').src = src;
  }

  function submitData() {
    const no = document.getElementById('noInput').value;
    const btn = document.getElementById('subBtn');
    if (!no || !capturedBase64) { alert("Nomor Transaksi dan Foto wajib ada!"); return; }
    
    btn.innerText = "MENYIMPAN...";
    btn.disabled = true;
    
    google.script.run.withSuccessHandler(res => {
        alert("Berhasil!");
        location.reload();
    }).processData(no, capturedBase64);
  }

  // Tambahkan fungsi switchTab, startScanner, dll seperti script sebelumnya
</script>
</body>
</html>
